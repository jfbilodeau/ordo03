  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: sleep 1 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Setup .NET
        run: sleep 3 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Restore
        run: sleep 2 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Build
        run: sleep 5 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Test
        run: sleep 2 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Publish
        run: sleep 7 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Package Build
        run: sleep 2 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Upload Package Artifact
        run: sleep 1 && echo "Step $GITHUB_STEP_SUMMARY"

  apply-bicep-template:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        run: sleep 7 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: iac

      - name: Deploy Bicep Template
        run: sleep 15 && echo "Step $GITHUB_STEP_SUMMARY"

  deploy-application:
    runs-on: ubuntu-latest
    needs:
      - build-and-package 
      - apply-bicep-template
      
    steps:
      - name: Azure Login
        run: sleep 7 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Download Package Artifact
        run: sleep 2 && echo "Step $GITHUB_STEP_SUMMARY"

      - name: Deploy Application
        run: sleep 14 && echo "Step $GITHUB_STEP_SUMMARY"
