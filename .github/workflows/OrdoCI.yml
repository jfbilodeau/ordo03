name: OrdoCI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: iac

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore iac/Ordo.sln

      - name: Build
        run: dotnet build iac/Ordo.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test iac/Ordo.sln --configuration Release --no-build --verbosity normal